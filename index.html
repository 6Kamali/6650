<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gearblock Network | Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --emerald: #2ecc71;
            --emerald-glow: rgba(46, 204, 113, 0.4);
            --glass-bg: rgba(15, 18, 15, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --blur: blur(16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            background: #050505 url('https://media.forgecdn.net/attachments/257/822/2019-07-25_19.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .splash-container {
            max-width: 700px;
            width: 100%;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .logo { 
            font-size: 2rem; 
            font-weight: 800; 
            letter-spacing: -1px; 
            margin-bottom: 30px;
        }
        .logo span { color: var(--emerald); }

        /* Heading Glitch Effect */
        h1 { 
            font-size: 3.5rem; 
            font-weight: 900; 
            margin-bottom: 15px; 
            line-height: 1.1;
            position: relative;
            display: inline-block;
        }
        h1 span { color: var(--emerald); }
        
        .glitch-title {
            animation: mainGlitch 4s infinite;
        }
        .glitch-title::before,
        .glitch-title::after {
            content: "Something New Is Coming.";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
        }
        .glitch-title::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitchLines 5s infinite linear alternate-reverse;
        }
        .glitch-title::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 0 2px 3px rgba(0,0,0,0.3);
            clip: rect(85px, 450px, 140px, 0);
            animation: glitchLines 3s infinite linear alternate-reverse;
        }

        .sub-text { 
            color: var(--text-dim); 
            font-size: 1.2rem; 
            margin-bottom: 40px; 
            font-weight: 500;
        }

        /* Countdown Grid Styles */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px 10px;
            backdrop-filter: blur(5px);
        }

        .time-box .number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            display: block;
            line-height: 1;
            margin-bottom: 5px;
        }

        .time-box .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--emerald);
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* Secrets Area (Hidden until 30s passes) */
        .secret-glitch-box {
            margin: 0 auto 25px;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: opacity 1s ease, max-height 1s ease;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            justify-content: center;
        }
        .secret-glitch-box.reveal {
            opacity: 1;
            max-height: 80px;
        }

        .scramble {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            font-weight: 800;
            color: #e74c3c;
            text-shadow: 0 0 8px rgba(231, 76, 60, 0.4);
            letter-spacing: 1px;
            display: inline-block;
        }

        /* Continue Button */
        .continue-btn {
            display: inline-block;
            background: var(--emerald);
            color: #000 !important;
            font-weight: 800;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px var(--emerald-glow);
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            font-size: 0.95rem;
            z-index: 5;
        }

        .continue-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 0 35px var(--emerald);
            filter: brightness(1.1);
        }

        /* Animation Keyframes */
        @keyframes mainGlitch {
            0%, 100% { transform: skew(0deg); }
            2% { transform: skew(3deg); }
            4% { transform: skew(-2deg); }
            5% { transform: skew(0deg); }
        }
        @keyframes glitchLines {
            0% { clip: rect(12px, 9999px, 65px, 0); }
            10% { clip: rect(34px, 9999px, 5px, 0); }
            20% { clip: rect(87px, 9999px, 98px, 0); }
            30% { clip: rect(2px, 9999px, 115px, 0); }
            40% { clip: rect(63px, 9999px, 40px, 0); }
            50% { clip: rect(120px, 9999px, 80px, 0); }
            60% { clip: rect(10px, 9999px, 142px, 0); }
            70% { clip: rect(95px, 9999px, 23px, 0); }
            80% { clip: rect(44px, 9999px, 121px, 0); }
            90% { clip: rect(3px, 9999px, 70px, 0); }
            100% { clip: rect(130px, 9999px, 55px, 0); }
        }

        @media (max-width: 500px) {
            h1 { font-size: 2.5rem; }
            .countdown-container { grid-template-columns: repeat(2, 1fr); }
            .time-box { padding: 15px 5px; }
            .time-box .number { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <div class="glass-panel">
            <div class="logo">GEAR<span>BLOCK</span></div>
            
            <h1 class="glitch-title">Something <span>New</span> Is Coming.</h1>
            <p class="sub-text">We are crafting an updated experience. Get ready for the next chapter.</p>
            
            <div class="countdown-container">
                <div class="time-box">
                    <span class="number" id="days">00</span>
                    <span class="label">Days</span>
                </div>
                <div class="time-box">
                    <span class="number" id="hours">00</span>
                    <span class="label">Hours</span>
                </div>
                <div class="time-box">
                    <span class="number" id="minutes">00</span>
                    <span class="label">Mins</span>
                </div>
                <div class="time-box">
                    <span class="number" id="seconds">00</span>
                    <span class="label">Secs</span>
                </div>
            </div>

            <!-- Glitched Easter Egg Block (Triggered after 30 seconds) -->
            <div class="secret-glitch-box" id="secret-box">
                <div class="scramble">new Admin?</div>
                <div class="scramble" style="color: var(--emerald); text-shadow: 0 0 8px rgba(46,204,113,0.4);">spawn revamped?</div>
            </div>

            <a href="home.html" class="continue-btn">Continue to Website <i class="fas fa-arrow-right" style="margin-left: 8px;"></i></a>
        </div>
    </div>

    <script>
        // Set the countdown target date: July 1st, 2026 00:00:00
        const targetDate = new Date("July 1, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            if (difference < 0) {
                clearInterval(countdownInterval);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
            }
        }

        updateCountdown();
        const countdownInterval = setInterval(updateCountdown, 1000);

        // 30 Seconds Delay Timer to expose secret text
        setTimeout(() => {
            const secretBox = document.getElementById('secret-box');
            if(secretBox) {
                secretBox.classList.add('reveal');
            }
        }, 30000);

        // Minecraft &k Scrambler Engine for the Easter Egg text
        document.addEventListener("DOMContentLoaded", () => {
            const scrambleElements = document.querySelectorAll('.scramble');
            const chars = "¡¢£¤¥¦§¨©ª«¬®¯°±²³´µ¶·¸¹º»¼½¾¿ÀÁÂÃÄÅÆÇÈÉÊËÌÍÎÏÐÑÒÓÔÕÖ×ØÙÚÛÜÝÞßàáâãäåæçèéêëìíîïðñòóôõö÷øùúûüýþÿ";

            scrambleElements.forEach(element => {
                const originalText = element.textContent.trim();
                
                setInterval(() => {
                    let scrambled = "";
                    for (let i = 0; i < originalText.length; i++) {
                        if (originalText[i] === " " || originalText[i] === "?") {
                            scrambled += originalText[i]; // Leave gaps and question marks intact
                        } else {
                            scrambled += chars[Math.floor(Math.random() * chars.length)];
                        }
                    }
                    element.textContent = scrambled;
                }, 50);
            });
        });
    </script>
</body>
</html>
