<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gearblock Network | Discord</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --emerald: #2ecc71;
            --emerald-glow: rgba(46, 204, 113, 0.4);
            --glass-bg: rgba(15, 18, 15, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --blur: blur(20px);
            --discord-blurple: #5865F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: #050505 url('https://media.forgecdn.net/attachments/257/822/2019-07-25_19.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav Consistency */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 8%; background: rgba(0, 0, 0, 0.4); backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--emerald); }
        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-size: 0.9rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover, .active { color: var(--emerald); }

        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .discord-icon {
            font-size: 5rem;
            color: var(--discord-blurple);
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(88, 101, 242, 0.4));
        }

        h1 { font-size: 2.5rem; margin-bottom: 15px; font-weight: 900; }
        p { color: var(--text-dim); margin-bottom: 35px; line-height: 1.6; font-size: 1.1rem; }

        .btn-discord {
            display: inline-block;
            background: var(--discord-blurple);
            color: white;
            padding: 18px 40px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 800;
            letter-spacing: 1px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3);
        }

        .btn-discord:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(88, 101, 242, 0.5);
            filter: brightness(1.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--glass-border);
        }

        .stat-item h4 { color: var(--emerald); font-size: 1.2rem; }
        .stat-item span { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; font-weight: 700; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">GEAR<span>BLOCK</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="updates.html">Updates</a></li>
            <li><a href="rules.html">Rules</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="halloffame.html">Hall Of Fame</a></li>
            <li><a href="staff.html">Staff</a></li>
            <li><a href="discord.html" class="active">Discord</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="glass-panel">
            <i class="fab fa-discord discord-icon"></i>
            <h1>Join the Comms</h1>
            <p>Sync with the Gearblock community. Get instant patch notes, engage with staff, and participate in exclusive server events.</p>
            
            <a href="https://discord.gg/MTyUUyA5TS" class="btn-discord" target="_blank">
                ESTABLISH CONNECTION
            </a>

            <div class="stats-grid">
                <div class="stat-item">
                    <h4>Active</h4>
                    <span>Community Status</span>
                </div>
                <div class="stat-item">
                    <h4>24/7</h4>
                    <span>Support Uplink</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
